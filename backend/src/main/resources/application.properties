spring.application.name=personal-manager
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/time_manager}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:time_manager}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:time_manager}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
server.port=${SERVER_PORT:8080}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
