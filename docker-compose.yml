services:
  postgres:
    image: postgres:15
    container_name: time-manager-postgres
    environment:
      POSTGRES_DB: time_manager
      POSTGRES_USER: time_manager
      POSTGRES_PASSWORD: time_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
